# @package _global_

defaults:
  - train
  - override experiment: dit
  - override /dataloader/dataset@val_dataloader.dataset: sim_minival
  - _self_
  - override hydra/hydra_logging: colorlog
  - override hydra/job_logging: colorlog

checkpoint_path: "${ckpt_root}/dit.pth"

# Output directory for PNGs
log_path: "${original_work_dir}/eval"

# Display mode: "bev" (default) or "topdown" (requires minival + topdown renders)
display_mode: bev

topdown_root: "${data_root}/topdown/minival"

# PNG dump settings
nsamples: 5
npreds: 25
only_moved: true        # if true, only visualise samples where the query object moved
min_displacement: 1.0   # minimum XZ displacement (metres) to count as moved

# overfit must be false for eval
overfit: false
